<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NLP for Customer Support</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: Arial, sans-serif;

            background: linear-gradient(
                135deg,
                #1e3c72,
                #2a5298
            );

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;
        }

        .container {

            width: 100%;
            max-width: 850px;

            background: white;

            padding: 40px;

            border-radius: 15px;

            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        h1 {

            text-align: center;

            color: #1e3c72;

            margin-bottom: 30px;

            font-size: 48px;
        }

        textarea {

            width: 100%;

            height: 180px;

            padding: 15px;

            border-radius: 10px;

            border: 1px solid #ccc;

            font-size: 16px;

            resize: none;

            outline: none;
        }

        textarea:focus {

            border-color: #2a5298;
        }

        button {

            width: 100%;

            margin-top: 20px;

            padding: 15px;

            border: none;

            border-radius: 10px;

            background: #1e3c72;

            color: white;

            font-size: 18px;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            background: #16325c;
        }

        .result {

            margin-top: 30px;
        }

        .reply-box {

            background: linear-gradient(
                135deg,
                #1e3c72,
                #2a5298
            );

            color: white;

            padding: 30px;

            border-radius: 15px;

            margin-bottom: 25px;

            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        .reply-box h2 {

            margin-bottom: 20px;

            font-size: 32px;
        }

        .reply-text {

            font-size: 24px;

            line-height: 1.8;

            font-weight: bold;
        }

        .details {

            background: #f5f7fb;

            padding: 25px;

            border-radius: 12px;

            border-left: 6px solid #1e3c72;
        }

        .details p {

            margin-bottom: 18px;

            font-size: 20px;

            line-height: 1.8;
        }

        .label {

            font-weight: bold;

            color: #1e3c72;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>NLP for Customer Support</h1>

        <form method="POST">

            <textarea
                name="message"
                placeholder="Describe your issue here..."
                required></textarea>

            <button type="submit">

                Predict Ticket Category

            </button>

        </form>

        {% if prediction %}

        <div class="result">

            <div class="reply-box">

                <h2>Suggested Solution</h2>

                <p class="reply-text">

                    {{ reply }}

                </p>

            </div>

            <div class="details">

                <p>

                    <span class="label">

                        Your Issue:

                    </span>

                    "{{ user_message }}"

                </p>

                <p>

                    <span class="label">

                        Predicted Ticket Subject:

                    </span>

                    {{ prediction }}

                </p>

                <p>

                    <span class="label">

                        Confidence Score:

                    </span>

                    {{ confidence }}%

                </p>

            </div>

        </div>

        {% endif %}

    </div>

</body>

</html>
